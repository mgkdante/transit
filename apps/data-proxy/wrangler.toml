# transit-data-proxy — serves the public /v1 snapshot contract from the
# transit-snapshots R2 bucket on the canonical host (slice-9.1.1p), plus the
# aggregated public KPI endpoint /api/v1/kpis (src/kpis.js).
#
# Deliberately narrow zone ROUTES (transit.yesid.dev/data/* + /api/v1/*), NOT
# a Worker custom domain: routes are matched most-specific-first, so both beat
# the transit-web app's transit.yesid.dev/* and everything else falls through
# to the app. /api/v1/* is scoped one level below /api/* on purpose — the web
# app owns /api/vitals (web-vitals beacon) and must keep receiving it. Do not
# widen or delete these routes without re-running smoke.sh.
name = "transit-data-proxy"
main = "src/worker.js"
compatibility_date = "2026-06-10"
# R2 endpoint account hash already public in .env.example (BRONZE_S3_ENDPOINT).
account_id = "eccfb9bedd87d413eaf4cac6ae2285d3"
workers_dev = false

routes = [
  { pattern = "transit.yesid.dev/data/*", zone_name = "yesid.dev" },
  { pattern = "transit.yesid.dev/api/v1/*", zone_name = "yesid.dev" },
]

[[r2_buckets]]
binding = "SNAPSHOTS"
bucket_name = "transit-snapshots"
