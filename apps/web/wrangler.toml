# Cloudflare Worker (Static Assets) config for the Transit citizen web app
# (slice-9.2). Deployed as a WORKER — not Pages — because the operator's
# account API token carries Workers + Workers Routes + DNS + zone scope but
# NOT Cloudflare Pages. adapter-cloudflare v7 targets either; the presence of
# `main` + `[assets]` (and the absence of `pages_build_output_dir`) selects the
# Workers build (emits `_worker.js` + `.assetsignore`, no `_routes.json`).
#
# /data/* stays on the existing zone-route worker (transit-data-proxy,
# slice-9.1.1p): Cloudflare matches the MORE-SPECIFIC route first, so
# `transit.yesid.dev/data/*` beats this app's `transit.yesid.dev/*` and the
# data worker keeps serving the /v1 snapshot contract untouched. Re-run
# apps/data-proxy/smoke.sh after any route change here.
name = "transit-web"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "eccfb9bedd87d413eaf4cac6ae2285d3"
# transit.yesid.dev is the target; no public workers.dev fallback URL.
workers_dev = false

# Bind the app to the apex transit host. Routes are evaluated by specificity,
# so the data-proxy's transit.yesid.dev/data/* route takes precedence here.
# (Declared BEFORE [assets] — a trailing array would otherwise nest under it.)
routes = [
  { pattern = "transit.yesid.dev/*", zone_name = "yesid.dev" },
]

[assets]
binding = "ASSETS"
directory = ".svelte-kit/cloudflare"

# SSR /v1 boot path. A Worker's fetch to its OWN zone (transit.yesid.dev/data/*)
# bypasses the sibling data-proxy route and hits a non-existent origin (523), so
# server-side rendering can't reach the snapshot contract over a same-origin URL.
# A service binding calls transit-data-proxy DIRECTLY (no DNS/route hop), so
# +layout.server.ts boots the contract through `platform.env.DATA` and ships real
# data in the first paint — no /v1-unreachable flash. Re-run ../data-proxy/smoke.sh
# is NOT needed for this (binding-only, the public /data/* route is untouched).
[[services]]
binding = "DATA"
service = "transit-data-proxy"

# ── Web-Vitals RUM (slice-9.7 item D) — INERT BY DEFAULT ────────────────────
# The web app ships a Core-Web-Vitals collector ($lib/vitals/collect.ts) + a
# beacon endpoint (/api/vitals → src/routes/api/vitals/+server.ts) that writes
# to a Cloudflare Analytics Engine dataset. BOTH halves are dormant until the
# OPERATOR wires the infra here — merging the code changes NOTHING in prod:
#   * collector: no-op unless PUBLIC_VITALS_ENABLED == "true" (commented below);
#   * endpoint:  204 no-op while the WEB_VITALS binding is absent (commented).
#
# OPERATOR — to ENABLE Web-Vitals RUM (exact steps, in order):
#   (a) Uncomment the [[analytics_engine_datasets]] block just below
#       (creating/enabling the dataset is automatic on first deploy with the
#       binding present — Analytics Engine has no separate "create" step).
#   (b) Uncomment `PUBLIC_VITALS_ENABLED = "true"` in [vars] below (and, if you
#       want RUM on the dev lane too, in [env.dev.vars]).
#   (c) Redeploy: merge to the deploy branch (auto-deploy) OR `wrangler deploy`.
# To DISABLE again: re-comment both, redeploy. Query the data via the
# Analytics Engine SQL API on dataset `transit_web_vitals`.
#
# [[analytics_engine_datasets]]
# binding = "WEB_VITALS"
# dataset = "transit_web_vitals"

[vars]
# Web-Vitals RUM master switch (slice-9.7 D). Commented = OFF = inert: the
# client collector imports nothing and beacons nothing. Uncomment to "true"
# (step (b) above) to turn the browser collector on. Keep in sync with the
# WEB_VITALS binding above — flag on + binding present = data flows.
# PUBLIC_VITALS_ENABLED = "true"
PUBLIC_SITE_ORIGIN = "https://transit.yesid.dev"
PUBLIC_V1_BASE = "/data/v1"
PUBLIC_INDEXING = "true"
# Provider copy identity for SSR-visible SEO when the manifest is absent (the
# manifest is the primary source via the DATA binding; this is the fallback +
# keeps titles keyworded until the manifest republishes with short_name/city).
# Per-deploy: each provider sets its own.
PUBLIC_PROVIDER_SHORT_NAME = "STM"
PUBLIC_PROVIDER_CITY = "Montréal"
# Social / authorship identity for the document head (Twitter card + author meta).
# AUTHOR is the human byline; the @handles drive twitter:site / twitter:creator.
# Leave a handle empty to omit that tag gracefully (no empty meta is emitted).
PUBLIC_SITE_AUTHOR = "Yesid"
PUBLIC_TWITTER_SITE = ""
PUBLIC_TWITTER_CREATOR = ""

[env.dev]
name = "transit-web-dev"
workers_dev = false
routes = [
  { pattern = "dev.transit.yesid.dev", custom_domain = true },
]

[env.dev.vars]
PUBLIC_SITE_ORIGIN = "https://dev.transit.yesid.dev"
PUBLIC_V1_BASE = "https://transit.yesid.dev/data/v1"
PUBLIC_INDEXING = "false"
PUBLIC_PROVIDER_SHORT_NAME = "STM"
PUBLIC_PROVIDER_CITY = "Montréal"
PUBLIC_SITE_AUTHOR = "Yesid"
PUBLIC_TWITTER_SITE = ""
PUBLIC_TWITTER_CREATOR = ""

[[env.dev.services]]
binding = "DATA"
service = "transit-data-proxy"
