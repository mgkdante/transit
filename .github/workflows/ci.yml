name: CI

# PR-triggered safety net for the db/ pipeline (codebase-audit infra-ci#0).
# Runs the offline suite, guards the alembic migration chain to a single head,
# and replays the full migration chain on a disposable Postgres so the real-DB
# regression suite actually executes in CI. ADDITIVE only — changes no runtime
# code. The scheduled production jobs (daily-static-pipeline, daily-warm-rollups)
# are unaffected; this workflow gates pull requests instead of running prod work.
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
    paths:
      - ".env.example"
      - ".gitleaks.toml"
      - "apps/db/**"
      - ".github/workflows/**"
      - ".github/scripts/**"
      - ".github/actions/**"
      - ".bun-version"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      classification: ${{ steps.classify.outputs.classification }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: mgkdante/yesid.dev-design/.github/actions/classify-paths@a4e9d0e3b42da8121b5e9f98de2e315ad48e8f25
        id: classify
        with:
          github-token: ${{ github.token }}
          rules-json: >-
            {
              "schema": 1,
              "always": {
                "paths": [".bun-version", ".env.example", ".gitleaks.toml", ".github/shared-tooling.json", ".github/workflows/ci.yml"],
                "prefixes": [".github/actions/", ".github/scripts/", ".github/shared-tooling/", ".github/workflows/"]
              },
              "jobs": {
                "offline-tests-work": {
                  "paths": [],
                  "prefixes": ["apps/db/"]
                },
                "alembic-single-head-work": {
                  "paths": [],
                  "prefixes": ["apps/db/"]
                },
                "real-db-tests-work": {
                  "paths": [],
                  "prefixes": ["apps/db/"]
                }
              },
              "ignore": {
                "docs-only": {
                  "paths": ["AGENTS.md", "CLAUDE.md", "CONTRIBUTING.md", "LICENSE", "README.md", "SECURITY.md", "SUPPORT.md"],
                  "prefixes": ["docs/"]
                },
                "irrelevant": {
                  "paths": [".env.1password", ".gitattributes", ".gitignore", ".mcp.json", ".npmrc", "bun.lock", "package.json", "turbo.json"],
                  "prefixes": [".claude/", ".codex/", ".githooks/", "apps/data-proxy/", "apps/web/", "packages/"]
                }
              }
            }

  # 1. Offline suite — the same `uv run pytest tests` developers run locally with
  #    TRANSIT_TEST_DATABASE_URL unset. Real-DB regression files self-skip here.
  offline-tests-work:
    needs: [classify]
    if: ${{ fromJSON(needs.classify.outputs.classification).relevant['offline-tests-work'] }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # CI runs an 80-col TTY; Rich/Typer wrap-truncates CLI help text and breaks
      # help-output assertions. Render wide so the help is fully present.
      COLUMNS: "200"
    defaults:
      run:
        working-directory: apps/db
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.15"

      - name: Install project dependencies
        run: uv sync --locked

      - name: Run offline test suite
        run: uv run pytest tests

      - name: Ruff (F-rules)
        run: uv run ruff check src tests --select F

  # 2. Single-head guard — `alembic heads` must report exactly one head, or a
  #    branched/forked migration chain will fail the empty-DB replay below and
  #    break the production `init-db` (which is `alembic upgrade head`).
  alembic-single-head-work:
    needs: [classify]
    if: ${{ fromJSON(needs.classify.outputs.classification).relevant['alembic-single-head-work'] }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/db
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.15"

      - name: Install project dependencies
        run: uv sync --locked

      - name: Assert a single alembic head
        run: |
          heads="$(uv run alembic heads 2>/dev/null | grep -c '(head)' || true)"
          echo "alembic heads reporting (head): ${heads}"
          if [ "${heads}" != "1" ]; then
            echo "::error::Expected exactly one alembic head, found ${heads}." >&2
            uv run alembic heads
            exit 1
          fi

  # 3. Real-DB suite — spin up a throwaway Postgres 16, replay the whole
  #    migration chain (`alembic upgrade head`) against the empty DB to catch the
  #    empty-DB-replay failure class, then export TRANSIT_TEST_DATABASE_URL so the
  #    real-DB regression files run instead of self-skipping. The container is
  #    discarded with the runner — never points at production.
  real-db-tests-work:
    needs: [classify]
    if: ${{ fromJSON(needs.classify.outputs.classification).relevant['real-db-tests-work'] }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/db
    services:
      postgres:
        # postgis/postgis (not stock postgres:16) — the migration chain does
        # CREATE EXTENSION postgis; pg_repack (0040) self-skips when absent.
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: transit_ci
          POSTGRES_PASSWORD: "transit_ci@:/%"
          POSTGRES_DB: transit_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U transit_ci -d transit_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      # alembic env.py resolves this through Settings.DATABASE_URL; the real-DB
      # tests read TRANSIT_TEST_DATABASE_URL. Same disposable container for both.
      DATABASE_URL: postgresql+psycopg://transit_ci@localhost:5432/transit_ci
      TRANSIT_TEST_DATABASE_URL: postgresql+psycopg://transit_ci@localhost:5432/transit_ci
      PGPASSWORD: "transit_ci@:/%"
      COLUMNS: "200"
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.15"

      - name: Install project dependencies
        run: uv sync --locked

      - name: Replay migration chain on empty Postgres
        run: uv run alembic upgrade head

      - name: Run real-DB regression suite
        run: uv run pytest tests

  required-contexts:
    needs: [classify, offline-tests-work, alembic-single-head-work, real-db-tests-work]
    if: ${{ always() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: offline-tests
          - context: alembic-single-head
          - context: real-db-tests
    name: ${{ matrix.context }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: mgkdante/yesid.dev-design/.github/actions/required-context@a4e9d0e3b42da8121b5e9f98de2e315ad48e8f25
        with:
          needs-json: ${{ toJSON(needs) }}
