name: Weekly pg_repack Maintenance

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run pg_repack in dry-run mode (manual default; the schedule executes).
        required: true
        type: boolean
        default: true
      tables:
        description: Optional whitespace-separated table list (empty uses the default churn set).
        required: false
        type: string
        default: ""
  schedule:
    # GitHub Actions cron is UTC-based. Runs after the daily pipeline windows.
    # 08:00 UTC Sunday = 04:00 Montreal, off-peak.
    - cron: "0 8 * * 0"

permissions:
  contents: read
  issues: write

concurrency:
  group: weekly-pg-repack
  cancel-in-progress: false

jobs:
  pg-repack-maintenance:
    runs-on: ubuntu-latest
    # First execute weeks repack live rows over WAN-orchestrated server-side copies;
    # GH hard cap is 360. 180 leaves headroom for the medium churn tables.
    timeout-minutes: 180
    defaults:
      run:
        working-directory: apps/db
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # Scheduled Sunday run EXECUTES; manual dispatch defaults to dry-run. A
      # job-level env here overrides any per-step env-file export, which is
      # exactly why the old 'Select manual mode' step never took effect — so the
      # flag is set declaratively as an expression instead.
      PG_REPACK_DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || format('{0}', inputs.dry_run) }}
      # Empty on schedule => run-pg-repack.sh ':-' default kicks in (the 10-table
      # churn set, excluding the 29GB silver.rt_trip_update_stop_times).
      PG_REPACK_TABLES: ${{ inputs.tables }}
      PG_REPACK_SIZE_REPORT: pg-repack-size-report.txt
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install pg_repack + psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates lsb-release wget
          sudo install -d /usr/share/postgresql-common/pgdg
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo tee /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc >/dev/null
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-16-repack postgresql-client-16

      - name: Run pg_repack maintenance
        run: bash scripts/run-pg-repack.sh

      - name: Upload pg_repack size report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pg-repack-size-report
          path: apps/db/pg-repack-size-report.txt
          if-no-files-found: ignore

      # working-directory is db; the shared alert script lives at the repo root.
      - name: Alert on failure
        if: failure()
        run: '../../.github/scripts/alert-issue.sh fire weekly-pg-repack "[alert] Weekly pg_repack Maintenance failed" "failed run ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

      - name: Resolve alert on success
        if: success()
        run: '../../.github/scripts/alert-issue.sh resolve weekly-pg-repack "recovered in run ${{ github.run_id }}"'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
