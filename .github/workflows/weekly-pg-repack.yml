name: Weekly pg_repack Bloat Check (dry-run)

# Dry-run bloat MONITOR. This workflow never executes a repack.
#
# pg_repack's actual table rewrite takes a brief ACCESS EXCLUSIVE lock. Running
# that over the public-internet WAN from a GitHub runner against the OCI Postgres
# proved unreliable for the hot tables: the long exclusive-lock op stalled until
# the SSL connection dropped ("SSL error: unexpected eof while reading", gh run
# 27989930577), and earlier interrupted swaps orphaned repack.log_* tables +
# repack_trigger triggers (a 6.7GB write-tax + disk leak, cleaned 2026-06-22).
#
# So this workflow now ONLY dry-runs: it captures the per-table size report (the
# bloat signal) and validates the tables are repack-eligible, and it alerts if
# that check fails. The ACTUAL repack is done ON-BOX via the on-VM runbook
# (loopback connection, no WAN), which is also where the 29GB
# silver.rt_trip_update_stop_times and the two hot gold.fact_* tables are handled.

on:
  workflow_dispatch:
    inputs:
      tables:
        description: Optional whitespace-separated table list to dry-run (empty uses the default churn set).
        required: false
        type: string
        default: ""
  schedule:
    # GitHub Actions cron is UTC-based. 08:00 UTC Sunday = 04:00 Montreal, off-peak.
    - cron: "0 8 * * 0"

permissions:
  contents: read
  issues: write

concurrency:
  group: weekly-pg-repack
  cancel-in-progress: false

jobs:
  pg-repack-maintenance:
    runs-on: ubuntu-latest
    # Dry-run only: a fast eligibility + size-report pass (no table rewrite, no
    # long lock). Mostly the apt install; the dry-run itself is ~1-2 min.
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/db
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # ALWAYS dry-run. This workflow is a monitor and must never execute a
      # repack over the WAN (see the header comment). Real repack is on-box.
      PG_REPACK_DRY_RUN: "true"
      # Empty => run-pg-repack.sh ':-' default kicks in (the 8-table churn set,
      # excluding the 29GB silver.rt_trip_update_stop_times and the two hot
      # gold.fact_* tables, all of which are repacked on-box).
      PG_REPACK_TABLES: ${{ inputs.tables }}
      PG_REPACK_SIZE_REPORT: pg-repack-size-report.txt
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install pg_repack + psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates lsb-release wget
          sudo install -d /usr/share/postgresql-common/pgdg
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo tee /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc >/dev/null
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-16-repack postgresql-client-16

      - name: Run pg_repack dry-run bloat check
        run: bash scripts/run-pg-repack.sh

      - name: Upload pg_repack size report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: pg-repack-size-report
          path: apps/db/pg-repack-size-report.txt
          if-no-files-found: ignore

      # working-directory is db; the shared alert script lives at the repo root.
      - name: Alert on failure
        if: failure()
        run: '../../.github/scripts/alert-issue.sh fire weekly-pg-repack "[alert] Weekly pg_repack dry-run check failed" "failed run ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

      - name: Resolve alert on success
        if: success()
        run: '../../.github/scripts/alert-issue.sh resolve weekly-pg-repack "recovered in run ${{ github.run_id }}"'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
