name: Refresh Basemap Extract

# Monthly refresh of the Montréal PMTiles basemap extract (slice-9.3, Family A
# live map). NOT triggered by push/turbo build — the basemap is content-immutable
# infra on a stable R2 key; a monthly swap keeps roads/landuse current without
# coupling to app deploys. Manual runs via workflow_dispatch.

on:
  schedule:
    - cron: "0 6 1 * *" # 06:00 UTC, 1st of each month
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: refresh-basemap
  cancel-in-progress: false

env:
  # Bump if the go-pmtiles release asset name/version drifts (confirm at
  # https://github.com/protomaps/go-pmtiles/releases). Verified working 2026-06-15.
  PMTILES_VERSION: "1.30.3"
  # A Web-Mercator SQUARE centered exactly on the OSM Île de Montréal relation
  # (3430571) bounds-center (lon -73.72628, lat 45.55253; extremes W -73.97642 /
  # E -73.47614 / S 45.40217 / N 45.70290). lon span 0.9° for desktop coverage;
  # the lat span is solved so width/height == 1 in Web Mercator. The island shape
  # drives the extract — no manual nudges.
  BBOX: "-74.17628,45.23742,-73.27628,45.86764"
  MAXZOOM: "15"
  R2_BUCKET: "transit-snapshots"
  R2_KEY: "v1/stm/static/basemap/montreal.pmtiles"

jobs:
  refresh-basemap:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install go-pmtiles
        run: |
          curl -sSL "https://github.com/protomaps/go-pmtiles/releases/download/v${PMTILES_VERSION}/go-pmtiles_${PMTILES_VERSION}_Linux_x86_64.tar.gz" | tar xz pmtiles
          sudo mv pmtiles /usr/local/bin/
          pmtiles version

      - name: Extract Montréal area from the latest Protomaps daily build
        run: |
          DATE="$(date -u -d 'yesterday' +%Y%m%d)"
          SRC="https://build.protomaps.com/${DATE}.pmtiles"
          echo "Extracting bbox=${BBOX} maxzoom=${MAXZOOM} from ${SRC}"
          pmtiles extract "${SRC}" montreal.pmtiles --bbox="${BBOX}" --maxzoom="${MAXZOOM}"

      - name: Verify the extract (fail loudly on regress)
        run: |
          pmtiles verify montreal.pmtiles
          pmtiles show montreal.pmtiles
          SIZE="$(stat -c%s montreal.pmtiles)"
          echo "extract size: ${SIZE} bytes"
          test "${SIZE}" -gt 100000

      - name: Upload to R2 (stable key, content-immutable)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Keep in lockstep with the other workflows (pinned by the pytest contract).
          wranglerVersion: "4.100.0"
          command: r2 object put "${{ env.R2_BUCKET }}/${{ env.R2_KEY }}" --file=montreal.pmtiles --content-type=application/octet-stream --remote
        env:
          CLOUDFLARE_ACCOUNT_ID: eccfb9bedd87d413eaf4cac6ae2285d3
