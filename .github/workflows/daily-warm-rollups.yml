name: Daily Warm Rollups

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC-based.
    # 07:00 UTC runs after the static pipeline at 06:00 UTC.
    # Daily warm rollups run inside the 14-day detail window (P3 repeat-offender
    # mart needs the trailing 14d), then aggregates remain available for 365 days
    # after detail rows prune. The historic /v1 snapshot publishes after rollups.
    - cron: "0 7 * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: daily-warm-rollups
  cancel-in-progress: false

jobs:
  build-warm-rollups:
    runs-on: ubuntu-latest
    # 25m headroom: rollups + 2 new marts + the historic /v1 publish (per-route
    # reliability files + the alert_history view) all run in this job. The
    # "8M-row alert_history" qualifier is obsolete after slice-9.1.1l's 0038
    # legacy NULL-hash collapse shrank the i3 history fan-out.
    timeout-minutes: 50  # tactical bump (was 25): i3-bloated rollups build exceeded it daily since Jun 7; structural fix = slice-9.1.1l (0038/0039 + daily prune-i3-storage)
    defaults:
      run:
        working-directory: apps/db
    env:
      APP_ENV: production
      LOG_LEVEL: INFO
      PROVIDER_TIMEZONE: America/Toronto
      STM_PROVIDER_ID: stm
      BRONZE_STORAGE_BACKEND: s3
      BRONZE_S3_ENDPOINT: https://eccfb9bedd87d413eaf4cac6ae2285d3.r2.cloudflarestorage.com
      BRONZE_S3_BUCKET: transit-raw
      BRONZE_S3_REGION: auto
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BRONZE_S3_ACCESS_KEY: ${{ secrets.BRONZE_S3_ACCESS_KEY }}
      BRONZE_S3_SECRET_KEY: ${{ secrets.BRONZE_S3_SECRET_KEY }}
      SNAPSHOT_STORAGE_BACKEND: s3
      SNAPSHOT_R2_BUCKET: ${{ secrets.SNAPSHOT_R2_BUCKET }}
      SNAPSHOT_PUBLIC_BASE_URL: ${{ secrets.SNAPSHOT_PUBLIC_BASE_URL }}
      # Public basemap pointer URLs (repo variables, not secrets). Unset -> empty
      # string -> falsy -> manifest.basemap stays null and no basemap.json is written.
      SNAPSHOT_BASEMAP_PMTILES_URL: ${{ vars.SNAPSHOT_BASEMAP_PMTILES_URL }}
      SNAPSHOT_BASEMAP_STYLE_URL: ${{ vars.SNAPSHOT_BASEMAP_STYLE_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install project dependencies
        run: uv sync --locked

      - name: Build 5-minute warm rollups (all providers)
        # One looped job over every provider; the expensive setup is paid once.
        run: |
          for provider in $(uv run python -m transit_ops.cli list-providers); do
            echo "::group::build-warm-rollups ${provider}"
            uv run python -m transit_ops.cli build-warm-rollups "$provider"
            echo "::endgroup::"
          done

      - name: Publish historic /v1 snapshot to R2 (all providers)
        run: uv run python -m transit_ops.cli publish-all --tier historic

      # Runs AFTER the historic publish so alert_history.json builds from the
      # unpruned silver history first. Steady-state daily volume is tiny
      # (~288 raw rows + a few hundred closed silver rows); the silver table is
      # a few thousand rows post-0038. Exits 1 on any R2 delete failure.
      - name: Prune i3 raw snapshots + closed silver history (all providers)
        run: |
          for provider in $(uv run python -m transit_ops.cli list-providers); do
            uv run python -m transit_ops.cli prune-i3-storage "$provider"
          done

      - name: Prune expired warm rollup rows (all providers)
        run: |
          for provider in $(uv run python -m transit_ops.cli list-providers); do
            uv run python -m transit_ops.cli prune-warm-rollup-storage "$provider"
          done

      # Bounded by BRONZE_PRUNE_MAX_OBJECTS_PER_BATCH x BRONZE_PRUNE_MAX_BATCHES
      # (5000 x 1 per phase, ~2-7 min) regardless of backlog. Exits 1 on any
      # R2 delete failure — a red job is the alert signal until slice-9.1.1o.
      # Capture-race-safe: the orphan-run delete is age-gated (30d/365d), and
      # 07:00 UTC runs an hour after the 06:00 static pipeline anyway.
      - name: Prune expired Bronze objects and raw metadata (all providers)
        run: |
          for provider in $(uv run python -m transit_ops.cli list-providers); do
            uv run python -m transit_ops.cli prune-bronze-storage "$provider"
          done

      - name: Build retention proof report (all providers)
        if: always()
        continue-on-error: true
        run: |
          mkdir -p artifacts
          for provider in $(uv run python -m transit_ops.cli list-providers); do
            uv run python -m transit_ops.cli retention-proof-report "$provider" --report-path "artifacts/retention-proof-${provider}.json"
          done

      - name: Upload retention proof artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: retention-proof-${{ github.run_id }}
          # working-directory does not apply to `uses:` steps — workspace-relative.
          path: apps/db/artifacts/retention-proof.json
          retention-days: 30

      # working-directory is db; the shared alert script lives at the repo root.
      - name: Alert on failure
        if: failure()
        run: '../../.github/scripts/alert-issue.sh fire daily-warm-rollups "[alert] Daily Warm Rollups failed" "failed run ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

      - name: Resolve alert on success
        if: success()
        run: '../../.github/scripts/alert-issue.sh resolve daily-warm-rollups "recovered in run ${{ github.run_id }}"'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
