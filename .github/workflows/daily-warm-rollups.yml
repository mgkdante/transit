name: Daily Warm Rollups

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC-based. This runs after the 06:00 UTC static lane.
    - cron: "0 7 * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: daily-warm-rollups
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apps/db
        shell: bash
    outputs:
      providers: ${{ steps.discover.outputs.providers }}
    env:
      APP_ENV: production
      LOG_LEVEL: INFO
      PROVIDER_TIMEZONE: America/Toronto
      STM_PROVIDER_ID: stm
      BRONZE_STORAGE_BACKEND: s3
      BRONZE_S3_ENDPOINT: https://eccfb9bedd87d413eaf4cac6ae2285d3.r2.cloudflarestorage.com
      BRONZE_S3_BUCKET: transit-raw
      BRONZE_S3_REGION: auto
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BRONZE_S3_ACCESS_KEY: ${{ secrets.BRONZE_S3_ACCESS_KEY }}
      BRONZE_S3_SECRET_KEY: ${{ secrets.BRONZE_S3_SECRET_KEY }}
      SNAPSHOT_STORAGE_BACKEND: s3
      SNAPSHOT_R2_BUCKET: ${{ secrets.SNAPSHOT_R2_BUCKET }}
      SNAPSHOT_PUBLIC_BASE_URL: ${{ secrets.SNAPSHOT_PUBLIC_BASE_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.15"

      - name: Install project dependencies
        run: uv sync --locked

      - name: Apply database migrations
        run: |
          mkdir -p artifacts/daily-warm-rollups/prepare
          uv run python -m transit_ops.cli init-db 2>&1 \
            | tee artifacts/daily-warm-rollups/prepare/migration-upgrade.txt

      - name: Prove database migration head
        run: |
          {
            uv run alembic heads
            uv run alembic current --check-heads
          } 2>&1 | tee artifacts/daily-warm-rollups/prepare/migration-head.txt

      - name: Discover providers and sync alert archive
        id: discover
        run: |
          artifact_dir="artifacts/daily-warm-rollups/prepare"
          mkdir -p "$artifact_dir"
          providers="$(uv run python -m transit_ops.cli list-providers)"
          if [[ -z "$providers" ]]; then
            echo "Provider discovery returned no providers" >&2
            exit 1
          fi
          discovered_providers=()
          declare -A seen_providers=()
          while IFS= read -r provider; do
            if [[ -z "$provider" ]]; then
              echo "Provider discovery returned an empty provider id" >&2
              exit 1
            fi
            if [[ ! "$provider" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*$ ]]; then
              echo "Provider discovery returned an unsafe provider id" >&2
              exit 1
            fi
            if [[ -n "${seen_providers[$provider]+x}" ]]; then
              echo "Provider discovery returned a duplicate provider id" >&2
              exit 1
            fi
            seen_providers["$provider"]=1
            discovered_providers+=("$provider")
          done <<< "$providers"
          providers_json="$(jq -cn --args '$ARGS.positional' "${discovered_providers[@]}")"
          printf '%s\n' "$providers_json" > "$artifact_dir/provider-discovery.json"
          printf 'providers=%s\n' "$providers_json" >> "$GITHUB_OUTPUT"
          for provider in "${discovered_providers[@]}"; do
            uv run python -m transit_ops.cli sync-alert-archive "$provider" \
              | tee "$artifact_dir/alert-archive-sync-${provider}.json"
          done

      - name: Upload prepare evidence
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: daily-warm-prepare-${{ github.run_id }}
          path: apps/db/artifacts/daily-warm-rollups/prepare/
          retention-days: 30
          if-no-files-found: warn

  rollups:
    needs: prepare
    runs-on: ubuntu-latest
    # Three 75-minute provider bounds plus kill grace fit inside the aggregate
    # step; job headroom preserves the always-run receipt upload.
    timeout-minutes: 250
    defaults:
      run:
        working-directory: apps/db
        shell: bash
    env:
      APP_ENV: production
      LOG_LEVEL: INFO
      PROVIDER_TIMEZONE: America/Toronto
      STM_PROVIDER_ID: stm
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PROVIDER_PLAN: ${{ needs.prepare.outputs.providers }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.15"

      - name: Install project dependencies
        run: uv sync --locked

      - name: Build warm rollups serially
        timeout-minutes: 235
        run: |
          artifact_dir="artifacts/daily-warm-rollups/rollups"
          mkdir -p "$artifact_dir"
          provider_plan="$(
            jq -cers '
              def valid_provider_id:
                type == "string"
                and length > 0
                and test("^[A-Za-z0-9][A-Za-z0-9._-]*$");
              if length != 1 then
                error("provider plan must contain exactly one JSON document")
              elif (.[0] | type) != "array" then
                error("provider plan must be an array")
              elif (.[0] | length) == 0 then
                error("provider plan must be nonempty")
              elif any(.[0][]; valid_provider_id | not) then
                error("provider plan contains an unsafe provider id")
              elif (.[0] | unique | length) != (.[0] | length) then
                error("provider plan contains duplicate provider ids")
              else
                .[0]
              end
            ' <<< "$PROVIDER_PLAN"
          )"
          provider_lines="$(jq -r '.[]' <<< "$provider_plan")" || exit "$?"
          mapfile -t providers <<< "$provider_lines"
          aggregate_status=0
          for provider in "${providers[@]}"; do
            receipt_path="$artifact_dir/rollup-stage-${provider}.json"
            log_path="$artifact_dir/rollup-${provider}.log"
            started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            jq -n \
              --arg provider_id "$provider" \
              --arg status "running" \
              --arg started_utc "$started_at" \
              '{provider_id: $provider_id, status: $status, started_utc: $started_utc}' \
              > "$receipt_path"
            set +e
            timeout --signal=TERM --kill-after=1m "75m" \
              uv run python -m transit_ops.cli build-warm-rollups "$provider" 2>&1 \
              | tee "$log_path"
            pipeline_status=("${PIPESTATUS[@]}")
            set -e
            command_status="${pipeline_status[0]}"
            log_status="${pipeline_status[1]}"
            if [[ "$log_status" -ne 0 ]]; then
              command_status="$log_status"
            fi
            if [[ "$command_status" -eq 0 ]]; then
              stage_status="success"
            else
              stage_status="failure"
            fi
            jq -n \
              --arg provider_id "$provider" \
              --arg status "$stage_status" \
              --arg started_utc "$started_at" \
              --arg completed_utc "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --argjson exit_code "$command_status" \
              '{provider_id: $provider_id, status: $status, started_utc: $started_utc,
                completed_utc: $completed_utc, exit_code: $exit_code}' \
              > "$receipt_path"
            if [[ "$aggregate_status" -eq 0 && "$command_status" -ne 0 ]]; then
              aggregate_status="$command_status"
            fi
          done
          exit "$aggregate_status"

      - name: Upload rollup receipts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: daily-warm-rollups-${{ github.run_id }}
          path: apps/db/artifacts/daily-warm-rollups/rollups/
          retention-days: 30
          if-no-files-found: warn

  publish:
    needs: [prepare, rollups]
    if: ${{ always() && needs.prepare.result == 'success' && needs.rollups.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: apps/db
        shell: bash
    env:
      APP_ENV: production
      LOG_LEVEL: INFO
      PROVIDER_TIMEZONE: America/Toronto
      STM_PROVIDER_ID: stm
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BRONZE_S3_ENDPOINT: https://eccfb9bedd87d413eaf4cac6ae2285d3.r2.cloudflarestorage.com
      BRONZE_S3_REGION: auto
      BRONZE_S3_ACCESS_KEY: ${{ secrets.BRONZE_S3_ACCESS_KEY }}
      BRONZE_S3_SECRET_KEY: ${{ secrets.BRONZE_S3_SECRET_KEY }}
      SNAPSHOT_STORAGE_BACKEND: s3
      SNAPSHOT_R2_BUCKET: ${{ secrets.SNAPSHOT_R2_BUCKET }}
      SNAPSHOT_PUBLIC_BASE_URL: ${{ secrets.SNAPSHOT_PUBLIC_BASE_URL }}
      SNAPSHOT_BASEMAP_PMTILES_URL: ${{ vars.SNAPSHOT_BASEMAP_PMTILES_URL }}
      SNAPSHOT_BASEMAP_STYLE_URL: ${{ vars.SNAPSHOT_BASEMAP_STYLE_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.15"

      - name: Install project dependencies
        run: uv sync --locked

      - name: Download alert archive receipts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: daily-warm-prepare-${{ github.run_id }}
          path: apps/db/artifacts/daily-warm-rollups/prepare

      - name: Publish gated historic snapshot
        run: |
          mkdir -p artifacts/daily-warm-rollups/publish
          uv run python -m transit_ops.cli publish-all --tier historic \
            --report-dir artifacts/daily-warm-rollups/publish \
            | tee artifacts/daily-warm-rollups/publish/historic-publish.json

      - name: Prove public historic snapshots and source messages
        run: |
          prepare_dir="artifacts/daily-warm-rollups/prepare"
          publish_dir="artifacts/daily-warm-rollups/publish"
          discovered_providers="$(
            jq -ers '
              def valid_provider_id:
                type == "string"
                and length > 0
                and test("^[A-Za-z0-9][A-Za-z0-9._-]*$");
              if length != 1 then
                error("provider discovery must contain exactly one JSON document")
              elif (.[0] | type) != "array" or (.[0] | length) == 0 then
                error("provider discovery must be a nonempty array")
              elif any(.[0][]; valid_provider_id | not) then
                error("provider discovery contains an unsafe provider id")
              elif (.[0] | unique | length) != (.[0] | length) then
                error("provider discovery contains duplicate provider ids")
              else
                .[0][]
              end
            ' "$prepare_dir/provider-discovery.json"
          )"
          active_providers=()
          while IFS= read -r provider; do
            receipt="$prepare_dir/alert-archive-sync-${provider}.json"
            receipt_json="$(
              jq -ecs --arg provider "$provider" '
                if length != 1 or (.[0] | type) != "object" then
                  error("sync receipt must be one JSON object")
                elif .[0].provider_id != $provider then
                  error("sync receipt provider_id does not match discovery")
                elif (
                  .[0] | has("skipped_not_seeded")
                  and (.skipped_not_seeded | type) != "boolean"
                ) then
                  error("sync receipt skipped_not_seeded must be boolean")
                else
                  .[0]
                end
              ' "$receipt"
            )"
            if [[ "$(jq -r '.skipped_not_seeded // false' <<< "$receipt_json")" != "true" ]]; then
              active_providers+=("$provider")
            fi
          done <<< "$discovered_providers"
          if [[ "${#active_providers[@]}" -eq 0 ]]; then
            echo "Provider discovery returned no active providers" >&2
            exit 1
          fi
          published_providers="$(
            jq -ers '
              def valid_provider_id:
                type == "string"
                and length > 0
                and test("^[A-Za-z0-9][A-Za-z0-9._-]*$");
              if length != 1 or (.[0] | type) != "array" or (.[0] | length) == 0 then
                error("historic publish result must be one nonempty array")
              elif any(.[0][];
                (type != "object") or (.provider_id | valid_provider_id | not)
              ) then
                error("historic publish result contains an unsafe provider")
              elif ([.[0][].provider_id] | unique | length) != (.[0] | length) then
                error("historic publish result contains duplicate providers")
              else
                [.[0][].provider_id] | sort | .[]
              end
            ' "$publish_dir/historic-publish.json"
          )"
          active_provider_set="$(printf '%s\n' "${active_providers[@]}" | sort)"
          if [[ "$active_provider_set" != "$published_providers" ]]; then
            echo "Historic publish provider set does not match active sync receipts" >&2
            exit 1
          fi
          for provider in "${active_providers[@]}"; do
            proof_path="$publish_dir/public-proof-${provider}.json"
            : > "$proof_path"
            uv run python -m transit_ops.cli verify-historic-publish "$provider" \
              --sync-report "$prepare_dir/alert-archive-sync-${provider}.json" \
              --gate-report "$publish_dir/publish-gate-${provider}.json" \
              --report-path "$proof_path"
            if ! jq -es --arg provider "$provider" '
              length == 1
              and (.[0] | type) == "object"
              and .[0].provider_id == $provider
              and .[0].status == "pass"
            ' "$proof_path" >/dev/null; then
              echo "Historic publication proof failed for ${provider}" >&2
              exit 1
            fi
          done

      - name: Upload publish evidence
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: daily-warm-publish-${{ github.run_id }}
          path: apps/db/artifacts/daily-warm-rollups/publish/
          retention-days: 30
          if-no-files-found: warn

  retention:
    needs: [prepare, publish]
    if: needs.publish.result == 'success'
    runs-on: ubuntu-latest
    # The previous provider job allowed 45 minutes. Each serial prune group is
    # hard-bounded at 40 minutes plus kill grace, with aggregate upload headroom.
    timeout-minutes: 150
    defaults:
      run:
        working-directory: apps/db
        shell: bash
    env:
      APP_ENV: production
      LOG_LEVEL: INFO
      PROVIDER_TIMEZONE: America/Toronto
      STM_PROVIDER_ID: stm
      BRONZE_STORAGE_BACKEND: s3
      BRONZE_S3_ENDPOINT: https://eccfb9bedd87d413eaf4cac6ae2285d3.r2.cloudflarestorage.com
      BRONZE_S3_BUCKET: transit-raw
      BRONZE_S3_REGION: auto
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BRONZE_S3_ACCESS_KEY: ${{ secrets.BRONZE_S3_ACCESS_KEY }}
      BRONZE_S3_SECRET_KEY: ${{ secrets.BRONZE_S3_SECRET_KEY }}
      PROVIDER_PLAN: ${{ needs.prepare.outputs.providers }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.15"

      - name: Install project dependencies
        run: uv sync --locked

      - name: Prune retained storage and write proofs
        timeout-minutes: 130
        run: |
          artifact_dir="artifacts/daily-warm-rollups/retention"
          mkdir -p "$artifact_dir"
          provider_plan="$(
            jq -cers '
              def valid_provider_id:
                type == "string"
                and length > 0
                and test("^[A-Za-z0-9][A-Za-z0-9._-]*$");
              if length != 1 then
                error("provider plan must contain exactly one JSON document")
              elif (.[0] | type) != "array" then
                error("provider plan must be an array")
              elif (.[0] | length) == 0 then
                error("provider plan must be nonempty")
              elif any(.[0][]; valid_provider_id | not) then
                error("provider plan contains an unsafe provider id")
              elif (.[0] | unique | length) != (.[0] | length) then
                error("provider plan contains duplicate provider ids")
              else
                .[0]
              end
            ' <<< "$PROVIDER_PLAN"
          )"
          provider_lines="$(jq -r '.[]' <<< "$provider_plan")" || exit "$?"
          mapfile -t providers <<< "$provider_lines"
          aggregate_status=0
          for provider in "${providers[@]}"; do
            set +e
            timeout --signal=TERM --kill-after=1m "40m" \
              bash --noprofile --norc -eo pipefail -c '
                provider="$1"
                uv run python -m transit_ops.cli prune-i3-storage "$provider"
                uv run python -m transit_ops.cli prune-warm-rollup-storage "$provider"
                uv run python -m transit_ops.cli prune-bronze-storage "$provider" --require-exhausted
              ' _ "$provider"
            prune_status="$?"
            set -e
            if [[ "$aggregate_status" -eq 0 && "$prune_status" -ne 0 ]]; then
              aggregate_status="$prune_status"
            fi

            set +e
            uv run python -m transit_ops.cli retention-proof-report "$provider" --report-path \
              "$artifact_dir/retention-proof-${provider}.json"
            proof_status="$?"
            set -e
            if [[ "$aggregate_status" -eq 0 && "$proof_status" -ne 0 ]]; then
              aggregate_status="$proof_status"
            fi
          done
          exit "$aggregate_status"

      - name: Upload retention receipts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: daily-warm-retention-${{ github.run_id }}
          path: apps/db/artifacts/daily-warm-rollups/retention/
          retention-days: 30
          if-no-files-found: warn

  notify:
    needs: [prepare, rollups, publish, retention]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Update daily warm rollups issue
        env:
          PREPARE_RESULT: ${{ needs.prepare.result }}
          ROLLUPS_RESULT: ${{ needs.rollups.result }}
          PUBLISH_RESULT: ${{ needs.publish.result }}
          RETENTION_RESULT: ${{ needs.retention.result }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          results="prepare=${PREPARE_RESULT}, rollups=${ROLLUPS_RESULT}, publish=${PUBLISH_RESULT}, retention=${RETENTION_RESULT}"
          if [[ "$PREPARE_RESULT" == "success" \
            && "$ROLLUPS_RESULT" == "success" \
            && "$PUBLISH_RESULT" == "success" \
            && "$RETENTION_RESULT" == "success" ]]; then
            .github/scripts/alert-issue.sh resolve daily-warm-rollups \
              "recovered in run ${{ github.run_id }} (${results})"
          else
            .github/scripts/alert-issue.sh fire daily-warm-rollups \
              "[alert] Daily Warm Rollups failed" \
              "failed run ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} (${results})"
          fi
