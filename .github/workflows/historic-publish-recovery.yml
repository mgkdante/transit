name: Historic Publish Recovery

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-warm-rollups
  cancel-in-progress: false

jobs:
  publish-historic-recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apps/db
        shell: bash
    env:
      APP_ENV: production
      LOG_LEVEL: INFO
      PROVIDER_TIMEZONE: America/Toronto
      STM_PROVIDER_ID: stm
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BRONZE_S3_ENDPOINT: https://eccfb9bedd87d413eaf4cac6ae2285d3.r2.cloudflarestorage.com
      BRONZE_S3_REGION: auto
      BRONZE_S3_ACCESS_KEY: ${{ secrets.BRONZE_S3_ACCESS_KEY }}
      BRONZE_S3_SECRET_KEY: ${{ secrets.BRONZE_S3_SECRET_KEY }}
      SNAPSHOT_STORAGE_BACKEND: s3
      SNAPSHOT_R2_BUCKET: ${{ secrets.SNAPSHOT_R2_BUCKET }}
      SNAPSHOT_PUBLIC_BASE_URL: ${{ secrets.SNAPSHOT_PUBLIC_BASE_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install project dependencies
        run: uv sync --locked

      - name: Apply database migrations
        run: |
          mkdir -p artifacts/historic-publish-recovery
          uv run python -m transit_ops.cli init-db 2>&1 \
            | tee artifacts/historic-publish-recovery/migration-upgrade.txt

      - name: Prove database migration head
        run: |
          {
            uv run alembic heads
            uv run alembic current --check-heads
          } 2>&1 | tee artifacts/historic-publish-recovery/migration-head.txt

      - name: Sync retained alert archive (all providers)
        run: |
          providers="$(uv run python -m transit_ops.cli list-providers)"
          if [[ -z "$providers" ]]; then
            echo "Provider discovery returned no providers" >&2
            exit 1
          fi
          while IFS= read -r provider; do
            if [[ -z "$provider" ]]; then
              echo "Provider discovery returned an empty provider id" >&2
              exit 1
            fi
            uv run python -m transit_ops.cli sync-alert-archive "$provider" \
              | tee "artifacts/historic-publish-recovery/alert-archive-sync-${provider}.json"
          done <<< "$providers"

      - name: Publish gated historic snapshot (all providers)
        run: |
          uv run python -m transit_ops.cli publish-all \
            --tier historic \
            --report-dir artifacts/historic-publish-recovery \
            | tee artifacts/historic-publish-recovery/historic-publish.json

      - name: Prove published historic snapshots
        run: |
          published_providers="$(
            jq -er '
              if type != "array" or length == 0 then
                error("historic publish result must be a nonempty array")
              elif any(
                .[];
                ((.provider_id | type) != "string" or (.provider_id | length) == 0)
              ) then
                error("every historic publish result needs a nonempty provider_id")
              else
                .[].provider_id
              end
            ' artifacts/historic-publish-recovery/historic-publish.json
          )"
          if [[ -z "$published_providers" ]]; then
            echo "Historic publish result returned no provider ids" >&2
            exit 1
          fi
          while IFS= read -r provider; do
            if [[ -z "$provider" ]]; then
              echo "Historic publish result returned an empty provider id" >&2
              exit 1
            fi
            proof_path="artifacts/historic-publish-recovery/public-proof-${provider}.json"
            : > "$proof_path"
            uv run python -m transit_ops.cli verify-historic-publish "$provider" \
              --sync-report "artifacts/historic-publish-recovery/alert-archive-sync-${provider}.json" \
              --gate-report "artifacts/historic-publish-recovery/publish-gate-${provider}.json" \
              --report-path "$proof_path"
            if [[ ! -s "$proof_path" ]]; then
              echo "Historic publication proof for ${provider} did not write a nonempty report" >&2
              exit 1
            fi
            if ! jq -e --arg provider "$provider" '
              type == "object"
              and .provider_id == $provider
              and .status == "pass"
            ' "$proof_path" >/dev/null; then
              echo "Historic publication proof report for ${provider} is invalid or failed" >&2
              exit 1
            fi
          done <<< "$published_providers"

      - name: Upload historic recovery evidence
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: historic-publish-recovery-${{ github.run_id }}
          path: apps/db/artifacts/historic-publish-recovery/
          retention-days: 30
          if-no-files-found: warn
