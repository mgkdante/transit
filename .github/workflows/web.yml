name: web

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - '.github/workflows/web.yml'
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/web.yml'

defaults:
  run:
    working-directory: apps/web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      # Install the whole bun workspace from the repo root (single root bun.lock).
      - name: Install
        working-directory: .
        run: bun install --frozen-lockfile

      # P0.9 trust anchor: regenerate tokens and fail if the committed outputs drift.
      - name: Token drift gate
        run: |
          bun run tokens:build
          git diff --exit-code -- src/lib/styles/tokens.css src/app.css src/lib/motion/tokens.ts

      - name: Lint + format
        run: |
          bun run lint
          bun run format:check

      - name: Type-check
        run: bun run check

      - name: Build (adapter-cloudflare)
        run: bun run build

      - name: Unit tests
        run: bun run test
