name: web

on:
  pull_request:
    branches: [main, develop]
    # Keep both paths lists identical (GH Actions has no reliable YAML-anchor
    # support). db-only changes skip web CI/deploys entirely (~20+ min saved
    # per db PR cycle; a db-only merge to main skips the idempotent redeploy).
    paths:
      - "apps/web/**"
      - "apps/data-proxy/**"
      - "packages/**"
      - "bun.lock"
      - ".bun-version"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/web.yml"
      - ".github/actions/**"
  push:
    branches: [main, develop]
    paths:
      - "apps/web/**"
      - "apps/data-proxy/**"
      - "packages/**"
      - "bun.lock"
      - ".bun-version"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/web.yml"
      - ".github/actions/**"
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Manual deploy/smoke target"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - production

permissions:
  contents: read

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/web

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JS workspace
        uses: ./.github/actions/setup

      - name: Design adoption integrity
        run: bun vendor/design/tools/adopt.ts --check --dest vendor/design

      # P0.9 trust anchor: regenerate tokens and fail if the committed outputs drift.
      - name: Token drift gate
        run: |
          bun run tokens:build
          git diff --exit-code -- src/lib/styles/tokens.css src/app.css src/lib/motion/tokens.ts

      # OG cards are generated by scripts/build-og.ts; fail if committed cards are
      # stale vs current copy (the failure mode `og:build --check` was built for).
      - name: OG drift gate
        run: bun run og:check

      - name: Lint + format
        run: |
          bun run lint
          bun run format:check

      - name: Type-check
        run: bun run check

      - name: Build (adapter-cloudflare)
        run: bun run build

      - name: Unit tests
        run: bun run test

  deploy-dev:
    name: deploy dev
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'dev')
    environment: development
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JS workspace
        uses: ./.github/actions/setup

      - name: Apply public snapshot CORS
        working-directory: apps/data-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bunx wrangler@4.100.0 r2 bucket cors set transit-snapshots --file r2-cors.json --force

      - name: Build dev Worker
        working-directory: apps/web
        env:
          PUBLIC_SITE_ORIGIN: https://dev.transit.yesid.dev
          PUBLIC_V1_BASE: https://data.yesid.dev/v1
          PUBLIC_INDEXING: "false"
        run: bun run build

      - name: Remove legacy dev DNS route host
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: 8a4ad7999bd6c2259b5b4acd52f39015
        run: |
          set -euo pipefail
          record_name="dev.transit.yesid.dev"
          legacy_comment="develop lane: Workers-route-only hostname for transit-web-dev"
          api="https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records"
          records_json="$(curl -fsS \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${api}?type=AAAA&name=${record_name}")"
          existing_id="$(jq -r '.result[0].id // empty' <<<"${records_json}")"
          if [ -z "${existing_id}" ]; then
            echo "No legacy DNS route host found for ${record_name}."
            exit 0
          fi

          content="$(jq -r '.result[0].content' <<<"${records_json}")"
          proxied="$(jq -r '.result[0].proxied' <<<"${records_json}")"
          comment="$(jq -r '.result[0].comment // ""' <<<"${records_json}")"
          if [ "${content}" != "100::" ] || [ "${proxied}" != "true" ] || [ "${comment}" != "${legacy_comment}" ]; then
            echo "Existing ${record_name} DNS record is not the legacy route host; leaving it in place."
            exit 0
          fi

          curl -fsS -X DELETE \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${api}/${existing_id}" | jq -e '.success == true' >/dev/null
          echo "Legacy DNS route host removed for ${record_name}; Wrangler will attach it as a custom domain."

      - name: Deploy dev Worker
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bunx wrangler@4.100.0 deploy --env dev

  deploy-production:
    name: deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.deploy_target == 'production')
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JS workspace
        uses: ./.github/actions/setup

      - name: Apply public snapshot CORS
        working-directory: apps/data-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bunx wrangler@4.100.0 r2 bucket cors set transit-snapshots --file r2-cors.json --force

      - name: Build production Worker
        working-directory: apps/web
        env:
          PUBLIC_SITE_ORIGIN: https://transit.yesid.dev
          PUBLIC_V1_BASE: https://data.yesid.dev/v1
          PUBLIC_INDEXING: "true"
        run: bun run build

      - name: Deploy production Worker
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bunx wrangler@4.100.0 deploy --env=""

      - name: Verify shared production routes
        working-directory: apps/data-proxy
        run: bash smoke.sh
