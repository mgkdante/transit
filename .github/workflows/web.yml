name: web

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Manual deploy/smoke target"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - production

permissions:
  contents: read

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/web

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JS workspace
        uses: ./.github/actions/setup

      # P0.9 trust anchor: regenerate tokens and fail if the committed outputs drift.
      - name: Token drift gate
        run: |
          bun run tokens:build
          git diff --exit-code -- src/lib/styles/tokens.css src/app.css src/lib/motion/tokens.ts

      - name: Lint + format
        run: |
          bun run lint
          bun run format:check

      - name: Type-check
        run: bun run check

      - name: Build (adapter-cloudflare)
        run: bun run build

      - name: Unit tests
        run: bun run test

  deploy-dev:
    name: deploy dev
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'dev')
    environment: development
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JS workspace
        uses: ./.github/actions/setup

      - name: Build dev Worker
        working-directory: apps/web
        env:
          PUBLIC_SITE_ORIGIN: https://dev.transit.yesid.dev
          PUBLIC_V1_BASE: https://transit.yesid.dev/data/v1
          PUBLIC_INDEXING: "false"
        run: bun run build

      - name: Deploy dev Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/web
          command: deploy --env dev
          wranglerVersion: "4.100.0"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-production:
    name: deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'production')
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JS workspace
        uses: ./.github/actions/setup

      - name: Build production Worker
        working-directory: apps/web
        env:
          PUBLIC_SITE_ORIGIN: https://transit.yesid.dev
          PUBLIC_V1_BASE: /data/v1
          PUBLIC_INDEXING: "true"
        run: bun run build

      - name: Deploy production Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/web
          command: deploy --env=""
          wranglerVersion: "4.100.0"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
