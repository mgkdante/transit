name: Daily Static Pipeline

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC-based.
    # 06:00 UTC corresponds to 2:00 AM Eastern while EDT is in effect.
    # If this workflow remains on GitHub cron during EST, this UTC value may
    # need a seasonal adjustment to keep the local run time at 2:00 AM Eastern.
    - cron: "0 6 * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: daily-static-pipeline
  cancel-in-progress: false

jobs:
  run-static-pipeline:
    runs-on: ubuntu-latest
    # Static snapshot PUTs are hash-gated; keep bounded headroom over the observed max.
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/db
    env:
      APP_ENV: production
      LOG_LEVEL: INFO
      PROVIDER_TIMEZONE: America/Toronto
      STM_PROVIDER_ID: stm
      BRONZE_STORAGE_BACKEND: s3
      BRONZE_S3_ENDPOINT: https://eccfb9bedd87d413eaf4cac6ae2285d3.r2.cloudflarestorage.com
      BRONZE_S3_BUCKET: transit-raw
      BRONZE_S3_REGION: auto
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BRONZE_S3_ACCESS_KEY: ${{ secrets.BRONZE_S3_ACCESS_KEY }}
      BRONZE_S3_SECRET_KEY: ${{ secrets.BRONZE_S3_SECRET_KEY }}
      SNAPSHOT_STORAGE_BACKEND: s3
      SNAPSHOT_R2_BUCKET: ${{ secrets.SNAPSHOT_R2_BUCKET }}
      SNAPSHOT_PUBLIC_BASE_URL: ${{ secrets.SNAPSHOT_PUBLIC_BASE_URL }}
      # Public basemap pointer URLs (repo variables, not secrets). Unset -> empty
      # string -> falsy -> manifest.basemap stays null and no basemap.json is written.
      SNAPSHOT_BASEMAP_PMTILES_URL: ${{ vars.SNAPSHOT_BASEMAP_PMTILES_URL }}
      SNAPSHOT_BASEMAP_STYLE_URL: ${{ vars.SNAPSHOT_BASEMAP_STYLE_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.15"

      - name: Install project dependencies
        run: uv sync --locked

      - name: Initialize database
        run: uv run python -m transit_ops.cli init-db

      - name: Seed core metadata
        run: uv run python -m transit_ops.cli seed-core

      - name: Run static + GIS Bronze -> Silver -> Gold pipeline (all providers)
        # One looped job over every configured provider so onboarding a provider
        # needs no workflow edit and the expensive setup (uv sync / init-db /
        # seed-core) is paid once per cron, not once per provider (a matrix would).
        run: |
          for provider in $(uv run python -m transit_ops.cli list-providers); do
            echo "::group::run-static-pipeline ${provider}"
            uv run python -m transit_ops.cli run-static-pipeline "$provider"
            echo "::endgroup::"
          done

      - name: Publish static /v1 snapshot to R2 (all providers)
        run: uv run python -m transit_ops.cli publish-all --tier static

  notify:
    needs: [run-static-pipeline]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Update daily static pipeline issue
        env:
          STATIC_RESULT: ${{ needs['run-static-pipeline'].result }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          results="run-static-pipeline=${STATIC_RESULT}"
          if [[ "$STATIC_RESULT" == "success" ]]; then
            .github/scripts/alert-issue.sh resolve daily-static-pipeline \
              "recovered in run ${{ github.run_id }} (${results})"
          else
            .github/scripts/alert-issue.sh fire daily-static-pipeline \
              "[alert] Daily Static Pipeline failed" \
              "failed run ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} (${results})"
          fi
