name: Daily Static Pipeline

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC-based.
    # 06:00 UTC corresponds to 2:00 AM Eastern while EDT is in effect.
    # If this workflow remains on GitHub cron during EST, this UTC value may
    # need a seasonal adjustment to keep the local run time at 2:00 AM Eastern.
    - cron: "0 6 * * *"

permissions:
  contents: read

concurrency:
  group: daily-static-pipeline
  cancel-in-progress: false

jobs:
  run-static-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90  # tactical bump (was 30): 9.2k-file WAN static publish exceeded it; structural fix = slice-9.1.1r hash-gated PUTs
    defaults:
      run:
        working-directory: db
    env:
      APP_ENV: production
      LOG_LEVEL: INFO
      PROVIDER_TIMEZONE: America/Toronto
      STM_PROVIDER_ID: stm
      BRONZE_STORAGE_BACKEND: s3
      BRONZE_S3_ENDPOINT: https://eccfb9bedd87d413eaf4cac6ae2285d3.r2.cloudflarestorage.com
      BRONZE_S3_BUCKET: transit-raw
      BRONZE_S3_REGION: auto
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BRONZE_S3_ACCESS_KEY: ${{ secrets.BRONZE_S3_ACCESS_KEY }}
      BRONZE_S3_SECRET_KEY: ${{ secrets.BRONZE_S3_SECRET_KEY }}
      SNAPSHOT_STORAGE_BACKEND: s3
      SNAPSHOT_R2_BUCKET: ${{ secrets.SNAPSHOT_R2_BUCKET }}
      SNAPSHOT_PUBLIC_BASE_URL: ${{ secrets.SNAPSHOT_PUBLIC_BASE_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install project dependencies
        run: uv sync --locked

      - name: Initialize database
        run: uv run python -m transit_ops.cli init-db

      - name: Seed core metadata
        run: uv run python -m transit_ops.cli seed-core

      - name: Run static + GIS Bronze -> Silver -> Gold pipeline
        run: uv run python -m transit_ops.cli run-static-pipeline stm

      - name: Publish static /v1 snapshot to R2
        run: uv run python -m transit_ops.cli publish-snapshot stm --tier static
