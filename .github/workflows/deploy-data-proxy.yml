name: Deploy Data Proxy Worker

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/data-proxy/**"
      - ".github/workflows/deploy-data-proxy.yml"
  push:
    branches: [main, develop]
    paths:
      - "apps/data-proxy/**"
      - ".github/workflows/deploy-data-proxy.yml"

permissions:
  contents: read

concurrency:
  group: deploy-data-proxy
  cancel-in-progress: false

jobs:
  test-data-proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/data-proxy
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Run worker behavioral suite
        run: node --test "test/*.test.mjs"

  deploy-data-proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test-data-proxy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    defaults:
      run:
        working-directory: apps/data-proxy
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Deploy worker with wrangler
        run: bunx wrangler@4.100.0 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Run production smoke
        run: bash smoke.sh
