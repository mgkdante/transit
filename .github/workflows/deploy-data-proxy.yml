name: Deploy Data Proxy Worker

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/data-proxy/**"
      - ".github/workflows/deploy-data-proxy.yml"
  push:
    branches: [main, develop]
    paths:
      - "apps/data-proxy/**"
      - ".github/workflows/deploy-data-proxy.yml"

permissions:
  contents: read

concurrency:
  group: deploy-data-proxy
  cancel-in-progress: false

jobs:
  test-data-proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/data-proxy
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"

      - name: Run worker behavioral suite
        run: node --test "test/*.test.mjs"

  deploy-data-proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test-data-proxy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    concurrency:
      group: transit-data-edge-production
      cancel-in-progress: false
    defaults:
      run:
        working-directory: apps/data-proxy
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version

      - name: Deploy worker with wrangler
        run: bunx wrangler@4.111.0 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Apply public snapshot CORS
        run: bunx wrangler@4.111.0 r2 bucket cors set transit-snapshots --file r2-cors.json --force
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Configure direct R2 edge caching
        run: node scripts/configure-data-edge.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: 8a4ad7999bd6c2259b5b4acd52f39015

      - name: Run production smoke
        run: bash smoke.sh
