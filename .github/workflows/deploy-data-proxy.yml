name: Deploy Data Proxy Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/data-proxy/**"
      - ".github/workflows/deploy-data-proxy.yml"

permissions:
  contents: read

concurrency:
  group: deploy-data-proxy
  cancel-in-progress: false

jobs:
  deploy-data-proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/data-proxy
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run worker behavioral suite
        run: node --test "test/*.test.mjs"

      - name: Deploy worker with wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/data-proxy
          # Keep in lockstep with package-lock.json (pinned by pytest contract).
          wranglerVersion: "4.100.0"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
