name: Setup Transit JS workspace
description: Install Bun and cache the Transit JavaScript workspace.

runs:
  using: composite
  steps:
    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: .bun-version

    - name: Prepare cache directories
      shell: bash
      working-directory: ${{ github.workspace }}
      run: mkdir -p ~/.bun/install/cache apps/web/.vitest/cache

    - name: Cache Bun install cache
      uses: actions/cache@v5
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', '.bun-version') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Cache Vitest
      uses: actions/cache@v5
      with:
        path: apps/web/.vitest/cache
        # Key on config only: hashing every src file made each commit a cache
        # miss, uploading a fresh ~full cache per run. restore-keys already
        # provide the warm fallback; vitest invalidates stale entries itself.
        key: ${{ runner.os }}-vitest-web-${{ hashFiles('bun.lock', 'apps/web/vite.config.ts') }}
        restore-keys: |
          ${{ runner.os }}-vitest-web-

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.workspace }}
      run: bun install --frozen-lockfile
