services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transit}
      POSTGRES_USER: ${POSTGRES_USER:-transit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transit-local-password}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-transit}:${POSTGRES_PASSWORD:-transit-local-password}@postgres:5432/${POSTGRES_DB:-transit}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - bronze_data:/app/data/bronze

  health:
    build:
      context: .
      dockerfile: Dockerfile.health
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-transit}:${POSTGRES_PASSWORD:-transit-local-password}@postgres:5432/${POSTGRES_DB:-transit}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    volumes:
      - bronze_data:/app/data/bronze

  caddy:
    image: caddy:2
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${CADDY_HTTP_PORT:-8080}:80"
      - "${CADDY_HTTPS_PORT:-8443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      health:
        condition: service_started

volumes:
  postgres_data:
  bronze_data:
  caddy_data:
  caddy_config:
